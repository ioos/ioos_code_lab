name: Test Install instructions Section

on:
  pull_request:

jobs:
  run:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: macos-latest
            INSTALLER: "Mambaforge-MacOSX-x86_64.sh"
          - os: ubuntu-latest
            INSTALLER: "Mambaforge-Linux-x86_64.sh"
          - os: windows-latest
            INSTALLER: "Mambaforge-Windows-x86_64.exe"
      fail-fast: false

    steps:
      - name: Download Mambaforge and the Env File
        shell: bash -l {0}
        run: |
          curl -L -O https://github.com/conda-forge/miniforge/releases/latest/download/${{ matrix.INSTALLER }}
          curl -L -O https://raw.githubusercontent.com/ioos/ioos_code_lab/main/.binder/environment.yml

      - name: Install Mambaforge on *nix
        shell: bash -l {0}
        if: startsWith(matrix.os, 'ubuntu') || startsWith(matrix.os, 'macOS')
        run: sh ${{ matrix.INSTALLER }} -b

      - name: Install Mambaforge on Windows
        shell: cmd
        if: startsWith(matrix.os, 'windows')
        run: start /wait "" ${{ matrix.INSTALLER }} /InstallationType=JustMe /RegisterPython=0 /S /D=%UserProfile%\Mambaforge

      - name: Create on *nix
        shell: bash -l {0}
        if: startsWith(matrix.os, 'ubuntu') || startsWith(matrix.os, 'macOS')
        run: |
          ~/mambaforge/bin/mamba env create --quiet --file environment.yml

      - name: Create on Windows
        shell: cmd
        if: startsWith(matrix.os, 'windows')
        run: |
          %UserProfile%\Mambaforge\bin\mamba update --yes --all
          %UserProfile%\Mambaforge\bin\mamba env create --quiet --file environment.yml

      - name: Test environment on *nix
        shell: bash -l {0}
        if: startsWith(matrix.os, 'ubuntu') || startsWith(matrix.os, 'macOS')
        run: |
          source ~/mambaforge/bin/activate IOOS
          python -c 'import osgeo.gdal; print(dir(osgeo.gdal))'

      - name: Test environment on Windows
        shell: cmd
        if: startsWith(matrix.os, 'windows')
        run: |
          %UserProfile%\Mambaforge\bin\conda activate IOOS
          python -c 'import osgeo.gdal; print(dir(osgeo.gdal))'
